<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MoneyNest</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060B14;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;font-family:-apple-system,sans-serif}
  .spinner{width:36px;height:36px;border:2.5px solid rgba(255,255,255,0.08);border-top-color:#00D4AA;border-radius:50%;animation:spin 700ms linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:13px;color:#475569}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Conectando…</p>
<script>
  // BroadcastChannel works across same-origin windows without needing opener reference.
  // This avoids the Cross-Origin-Opener-Policy block that Google sets.
  try {
    const ch = new BroadcastChannel('mn_oauth');
    ch.postMessage({ type: 'mn_oauth_callback', href: location.href });
    ch.close();
  } catch (e) {
    // BroadcastChannel not supported — try postMessage as fallback
    try {
      if (window.opener) {
        window.opener.postMessage({ type: 'mn_oauth_callback', href: location.href }, location.origin);
      }
    } catch (_) {}
  }
  // Close popup after a short delay
  setTimeout(() => {
    window.close();
    // If window.close() is blocked, show a message
    setTimeout(() => {
      document.querySelector('p').textContent = 'Puedes cerrar esta ventana.';
      document.querySelector('.spinner').style.display = 'none';
    }, 800);
  }, 300);
</script>
</body>
</html>
