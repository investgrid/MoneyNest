<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MoneyNest</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060B14;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;font-family:-apple-system,sans-serif}
  .spinner{width:36px;height:36px;border:2.5px solid rgba(255,255,255,0.08);border-top-color:#00D4AA;border-radius:50%;animation:spin 700ms linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:13px;color:#475569}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Conectando…</p>
<script>
  // Send the full callback URL to the opener so it can process PKCE exchange
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage(
      { type: 'mn_oauth_callback', href: location.href },
      location.origin
    );
    window.close();
  } else {
    // No opener (e.g. redirect fallback) — go to app
    location.replace('/');
  }
</script>
</body>
</html>
