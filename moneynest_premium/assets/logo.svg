<svg viewBox="0 0 240 240" width="240" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C49A"/>
      <stop offset="100%" stop-color="#00F0C0"/>
    </linearGradient>
    <linearGradient id="ovalGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A9BB5"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
    <linearGradient id="ovalGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B7A8F"/>
      <stop offset="50%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="ovalGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="50%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Oval nest rings — 3 concentric tilted ellipses -->
  <!-- Outer ring -->
  <ellipse cx="122" cy="168" rx="88" ry="22" fill="none" stroke="url(#ovalGrad1)" stroke-width="8" stroke-linecap="round" transform="rotate(-6 122 168)" opacity="0.95"/>
  <!-- Middle ring -->
  <ellipse cx="122" cy="160" rx="68" ry="16" fill="none" stroke="url(#ovalGrad2)" stroke-width="6" stroke-linecap="round" transform="rotate(-6 122 160)" opacity="0.75"/>
  <!-- Inner ring -->
  <ellipse cx="122" cy="154" rx="48" ry="11" fill="none" stroke="url(#ovalGrad3)" stroke-width="4" stroke-linecap="round" transform="rotate(-6 122 154)" opacity="0.55"/>

  <!-- Growth chart arrow — zigzag up-right -->
  <polyline
    points="68,148 100,116 132,134 178,76"
    stroke="url(#arrowGrad)"
    stroke-width="12"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <!-- Arrowhead -->
  <polyline
    points="163,70 179,76 173,92"
    stroke="url(#arrowGrad)"
    stroke-width="12"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
